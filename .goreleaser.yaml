version: 2
project_name: epithet

builds:
  - id: epithet
    main: ./cmd/epithet
    binary: epithet
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: epithet-ssh
    name: epithet

homebrew_casks:
  - name: epithet
    binaries:
      - epithet
    repository:
      owner: epithet-ssh
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://epithet.dev/
    description: SSH certificate management
    caveats: |
      To start the agent:
        brew services start epithet
